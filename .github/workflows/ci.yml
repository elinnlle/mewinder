name: CI

on:
  push:
  pull_request:

jobs:
  flutter-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Create fallback secrets.dart for CI
        run: |
          if [ ! -f lib/secrets.dart ]; then
            cat > lib/secrets.dart <<'EOF'
            const catApiKey = "";
            EOF
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test
